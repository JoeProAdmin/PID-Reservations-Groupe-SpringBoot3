# ============================================
# CI/CD Pipeline - GitHub Actions
# PID Reservations Groupe - ICC 2025-2026
# Auteur : Abdulrahman SABBAGH (Production)
# ============================================
# Ce pipeline s'execute automatiquement a chaque push/PR
# Il verifie que le backend et le frontend compilent correctement

name: CI - PID Reservations

on:
  push:
    branches: [ main, sabbagh-production, youssef-admin-backend-v2, redouane-frontend, hatim-docs ]
  pull_request:
    branches: [ main ]

jobs:

  # ==========================================
  # Job 1 : Build & Test Backend (Spring Boot)
  # ==========================================
  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pid_reservations_group
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Backend
        run: mvn clean compile -B
        env:
          DB_URL: jdbc:mysql://localhost:3306/pid_reservations_group?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          DB_USER: root
          DB_PASSWORD: root

      - name: Run Tests
        run: mvn test -B
        env:
          DB_URL: jdbc:mysql://localhost:3306/pid_reservations_group?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          DB_USER: root
          DB_PASSWORD: root

      - name: Package JAR
        run: mvn package -DskipTests -B

  # ==========================================
  # Job 2 : Build Frontend (React)
  # ==========================================
  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:8080

  # ==========================================
  # Job 3 : Build Docker Images
  # ==========================================
  docker:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t pid-backend:latest ./backend

      - name: Build Frontend Image
        run: docker build -t pid-frontend:latest ./frontend

      - name: Check Docker Images
        run: |
          docker images | grep pid
