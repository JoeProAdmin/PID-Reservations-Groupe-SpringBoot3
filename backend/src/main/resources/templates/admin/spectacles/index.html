<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des spectacles</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            margin-bottom: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            margin-right: 5px;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
        }

        .btn-edit {
            background-color: #007bff;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #333;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .empty {
            text-align: center;
            padding: 20px;
            color: #888;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Gestion des spectacles</h1>

    <a href="/admin/spectacles/create" class="btn btn-add">+ Ajouter</a>

    <br><br>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Date</th>
            <th>Prix</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <!-- SI VIDE -->
        <tr th:if="${#lists.isEmpty(spectacles)}">
            <td colspan="5" class="empty">Aucun spectacle</td>
        </tr>

        <!-- LISTE -->
        <tr th:each="spectacle : ${spectacles}">
            <td th:text="${spectacle.id}"></td>

            <td th:text="${spectacle.title}"></td>

            <td th:text="${#temporals.format(spectacle.date, 'dd/MM/yyyy HH:mm')}"></td>

            <td th:text="${spectacle.price}"></td>

            <td>
                <!-- BOUTON EDIT -->
                <a th:href="@{'/admin/spectacles/edit/' + ${spectacle.id}}"
                   class="btn btn-edit">
                    Modifier
                </a>

                <!-- BOUTON DELETE -->
                <a th:href="@{'/admin/spectacles/delete/' + ${spectacle.id}}"
                   class="btn btn-delete">
                    Supprimer
                </a>
            </td>
        </tr>

        </tbody>
    </table>

</div>

</body>
</html>
