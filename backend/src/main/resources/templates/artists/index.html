<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Liste des artistes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            margin-bottom: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .btn {
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
        }

        .btn-edit {
            background-color: #007bff;
            color: white;
            margin-right: 6px;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        thead {
            background-color: #333;
            color: white;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .empty {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .actions {
            white-space: nowrap;
        }
    </style>
</head>

<body>

<div class="container">

    <h1 th:text="${title}">Liste des artistes</h1>

    <div class="top-bar">
        <div></div>
        <a th:href="@{/artists/create}" class="btn btn-add">+ Ajouter un artiste</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Prénom</th>
            <th>Nom</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${#lists.isEmpty(artists)}">
            <td colspan="4" class="empty">Aucun artiste trouvé</td>
        </tr>

        <tr th:each="artist : ${artists}">
            <td th:text="${artist.id}"></td>
            <td th:text="${artist.firstname}"></td>
            <td th:text="${artist.lastname}"></td>
            <td class="actions">
                <a href="#" class="btn btn-edit">Modifier</a>
                <a href="#" class="btn btn-delete">Supprimer</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
