########################################
# Application
########################################
spring.application.name=pid-reservations-group
server.port=8080

########################################
# Configuration locale flexible
# Chaque membre peut surcharger via variables locales
########################################
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/pid_reservations_group?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

########################################
# Hikari (stabilit\u00E9 connexion)
########################################
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

########################################
# JPA / Hibernate
########################################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

########################################
# Initialisation SQL
########################################
spring.sql.init.mode=always

########################################
# Logs
########################################
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE