########################################
# Application
########################################
spring.application.name=pid-reservations-group
server.port=8080

########################################
# Base de donn\u00E9es
########################################
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/pid_reservations_group?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

########################################
# Hikari
########################################
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

########################################
# JPA / Hibernate
########################################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

########################################
# D\u00E9sactive data.sql
########################################
spring.sql.init.mode=always

########################################
# Logs
########################################
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

########################################
# Stripe (Paiement)
########################################
stripe.secret.key=${STRIPE_SECRET_KEY:}

########################################
# CORS
########################################
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

########################################
# Mail (Mailtrap sandbox)
########################################
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

########################################
# App URLs (pour les liens dans les emails)
########################################
app.mail.from=${APP_MAIL_FROM:no-reply@pid-reservations.be}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

########################################
# Google Cloud Translation API (traduction des commentaires)
# Si la cle est vide, fallback automatique sur MyMemory (gratuit, sans cle)
# Pour obtenir une cle Google : https://console.cloud.google.com/apis/credentials
########################################
google.translate.api-key=${GOOGLE_TRANSLATE_KEY:}
google.translate.base-url=${GOOGLE_TRANSLATE_URL:https://translation.googleapis.com/language/translate/v2}
mymemory.base-url=${MYMEMORY_URL:https://api.mymemory.translated.net/get}
