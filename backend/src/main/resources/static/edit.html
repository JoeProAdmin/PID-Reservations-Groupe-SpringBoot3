<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Modifier un artiste</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
        <link href="css/styles.css" rel="stylesheet" />
        <style>
            .page-header-section {
                background: linear-gradient(to bottom, #212529 0%, #3d4149 100%);
                padding: 6rem 0 3rem;
                margin-top: 72px;
            }
            .page-header-section h2 {
                font-family: 'Montserrat', sans-serif;
                font-weight: 700;
                text-transform: uppercase;
                color: #fff;
                font-size: 2.5rem;
                margin-bottom: 0.5rem;
            }
            .page-header-section p {
                font-family: 'Roboto Slab', serif;
                color: #adb5bd;
            }
            .breadcrumb-item a {
                color: #fec810;
                text-decoration: none;
            }
            .breadcrumb-item.active { color: #adb5bd; }
            .breadcrumb-item + .breadcrumb-item::before { color: #6c757d; }

            .form-card {
                background: #fff;
                border-radius: 4px;
                box-shadow: 0 2px 20px rgba(0,0,0,0.08);
                padding: 2.5rem;
            }
            .form-section-title {
                font-family: 'Montserrat', sans-serif;
                font-weight: 700;
                text-transform: uppercase;
                font-size: 0.75rem;
                letter-spacing: 0.12em;
                color: #fec810;
                background: #212529;
                display: inline-block;
                padding: 0.3em 0.9em;
                margin-bottom: 1.5rem;
            }
            .form-label {
                font-family: 'Montserrat', sans-serif;
                font-weight: 700;
                font-size: 0.78rem;
                text-transform: uppercase;
                letter-spacing: 0.07em;
                color: #495057;
                margin-bottom: 0.4rem;
            }
            .form-control {
                border: 1px solid #dee2e6;
                border-radius: 2px;
                font-family: 'Roboto Slab', serif;
                font-size: 0.95rem;
                padding: 0.65rem 1rem;
                color: #212529;
                transition: border-color 0.2s;
            }
            .form-control:focus {
                border-color: #fec810;
                box-shadow: 0 0 0 3px rgba(254,200,16,0.2);
            }
            .form-control::placeholder { color: #adb5bd; }
            textarea.form-control { resize: none; }

            .char-count {
                font-family: 'Roboto Slab', serif;
                font-size: 0.78rem;
                color: #adb5bd;
                text-align: right;
                margin-top: 0.3rem;
            }
            .divider {
                border: none;
                border-top: 1px solid #f0f0f0;
                margin: 2rem 0;
            }
            .alert-success-custom {
                background: #d1fae5;
                border: 1px solid #6ee7b7;
                color: #065f46;
                border-radius: 2px;
                padding: 0.9rem 1.2rem;
                font-family: 'Roboto Slab', serif;
                font-size: 0.9rem;
            }
            .alert-danger-custom {
                background: #fee2e2;
                border: 1px solid #fca5a5;
                color: #7f1d1d;
                border-radius: 2px;
                padding: 0.9rem 1.2rem;
                font-family: 'Roboto Slab', serif;
                font-size: 0.9rem;
            }
            .btn-cancel {
                font-family: 'Montserrat', sans-serif;
                font-weight: 700;
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                padding: 0.7rem 1.8rem;
                border: 1px solid #dee2e6;
                background: transparent;
                color: #6c757d;
                border-radius: 2px;
                text-decoration: none;
                transition: all 0.2s;
            }
            .btn-cancel:hover {
                background: #f8f9fa;
                color: #212529;
            }
            .loading-overlay {
                text-align: center;
                padding: 3rem 0;
                font-family: 'Roboto Slab', serif;
                color: #adb5bd;
            }
        </style>
    </head>
    <body id="page-top">

        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
            <div class="container">
                <a class="navbar-brand" href="/index.html">
                    <i class="fas fa-music me-2"></i>ArtistDB
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive">
                    Menu <i class="fas fa-bars ms-1"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0">
                        <li class="nav-item"><a class="nav-link" href="/index.html">Artistes</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Page Header -->
        <div class="page-header-section">
            <div class="container">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-3" style="background:transparent; padding:0;">
                        <li class="breadcrumb-item"><a href="/index.html">Artistes</a></li>
                        <li class="breadcrumb-item active" id="breadcrumbName">Modifier</li>
                    </ol>
                </nav>
                <h2>Modifier l'artiste</h2>
                <p id="headerSubtitle">Chargement...</p>
            </div>
        </div>

        <!-- Form Section -->
        <section class="page-section bg-light">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8">

                        <!-- Notification -->
                        <div id="notification" class="mb-4" style="display:none;"></div>

                        <!-- Loading state -->
                        <div id="loadingState" class="loading-overlay">
                            <div class="spinner-border text-primary mb-3" role="status"></div>
                            <p>Chargement des données...</p>
                        </div>

                        <!-- Form Card -->
                        <div class="form-card" id="formCard" style="display:none;">

                            <!-- Section 1 : Infos principales -->
                            <div class="form-section-title">
                                <i class="fas fa-user me-2"></i>Informations principales
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nom de l'artiste *</label>
                                    <input type="text" id="name" class="form-control" placeholder="Ex: Miles Davis">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Genre musical *</label>
                                    <input type="text" id="genre" class="form-control" placeholder="Ex: Homme/Femme">
                                </div>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Pays d'origine</label>
                                    <input type="text" id="country" class="form-control" placeholder="Ex: États-Unis">
                                </div>
                            </div>

                            <hr class="divider">

                            <!-- Section 2 : Description -->
                            <div class="form-section-title">
                                <i class="fas fa-file-alt me-2"></i>Biographie
                            </div>

                            <div>
                                <label class="form-label">Description</label>
                                <textarea id="description" class="form-control" rows="5"
                                    placeholder="Décrivez l'artiste, sa carrière, son style musical..."
                                    maxlength="1000"
                                    oninput="updateCharCount()"></textarea>
                                <div class="char-count"><span id="charCount">0</span> / 1000</div>
                            </div>

                            <hr class="divider">

                            <!-- Actions -->
                            <div class="d-flex justify-content-between align-items-center">
                                <a href="/index.html" class="btn-cancel">
                                    <i class="fas fa-arrow-left me-2"></i>Annuler
                                </a>
                                <button onclick="updateArtist()" class="btn btn-primary btn-xl text-uppercase" id="submitBtn">
                                    <i class="fas fa-save me-2"></i>Sauvegarder
                                </button>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer py-4">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-4 text-lg-start" style="font-family:'Roboto Slab',serif;">Copyright &copy; ArtistDB 2026</div>
                    <div class="col-lg-4 my-3 my-lg-0 text-center">
                        <i class="fas fa-music text-primary"></i>
                    </div>
                    <div class="col-lg-4 text-lg-end">
                        <a class="link-dark text-decoration-none me-3" href="#">Politique de confidentialité</a>
                    </div>
                </div>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/scripts.js"></script>
        <script>
            const id = new URLSearchParams(window.location.search).get('id');

            // Charge les données de l'artiste
            fetch(`/api/artists/${id}`)
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.json();
                })
                .then(artist => {
                    document.getElementById('name').value = artist.name || '';
                    document.getElementById('genre').value = artist.genre || '';
                    document.getElementById('country').value = artist.country || '';
                    document.getElementById('description').value = artist.description || '';
                    document.getElementById('charCount').textContent = (artist.description || '').length;
                    document.getElementById('breadcrumbName').textContent = artist.name;
                    document.getElementById('headerSubtitle').textContent = `Modification de : ${artist.name}`;

                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('formCard').style.display = 'block';
                })
                .catch(() => {
                    document.getElementById('loadingState').innerHTML = `
                        <i class="fas fa-exclamation-triangle text-danger fa-2x mb-3"></i>
                        <p>Artiste introuvable.</p>
                        <a href="/index.html" class="btn btn-primary text-uppercase" style="font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.8rem;">Retour à la liste</a>
                    `;
                });

            function updateCharCount() {
                document.getElementById('charCount').textContent =
                    document.getElementById('description').value.length;
            }

            function showNotification(message, type) {
                const el = document.getElementById('notification');
                el.style.display = 'block';
                el.className = type === 'success' ? 'alert-success-custom mb-4' : 'alert-danger-custom mb-4';
                el.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>${message}`;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function updateArtist() {
                const name = document.getElementById('name').value.trim();
                const genre = document.getElementById('genre').value.trim();

                if (!name || !genre) {
                    showNotification('Le nom et le genre sont obligatoires.', 'error');
                    return;
                }

                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sauvegarde...';

                fetch(`/api/artists/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        genre: genre,
                        country: document.getElementById('country').value.trim(),
                        description: document.getElementById('description').value.trim()
                    })
                })
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.json();
                })
                .then(() => {
                    showNotification('Artiste modifié avec succès ! Redirection...', 'success');
                    setTimeout(() => window.location.href = '/index.html', 1500);
                })
                .catch(() => {
                    showNotification('Une erreur est survenue. Veuillez réessayer.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-save me-2"></i>Sauvegarder';
                });
            }
        </script>
    </body>
</html>
