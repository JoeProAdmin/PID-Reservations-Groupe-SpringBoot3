<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Liste des artistes</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
        <link href="css/styles.css" rel="stylesheet" />
        <style>
            .artist-card {
                background: #fff;
                border: none;
                border-radius: 4px;
                box-shadow: 0 2px 12px rgba(0,0,0,0.08);
                transition: transform 0.2s, box-shadow 0.2s;
                overflow: hidden;
            }
            .artist-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 8px 24px rgba(0,0,0,0.13);
            }
            .artist-card .card-header {
                background: #fec810;
                padding: 1.2rem 1.5rem 0.8rem;
                border: none;
            }
            .artist-card .card-header h5 {
                font-family: 'Montserrat', sans-serif;
                font-weight: 700;
                text-transform: uppercase;
                font-size: 1rem;
                margin: 0;
                color: #212529;
            }
            .artist-card .card-body {
                padding: 1.2rem 1.5rem;
            }
            .artist-card .badge-genre {
                background: #212529;
                color: #fec810;
                font-family: 'Montserrat', sans-serif;
                font-size: 0.7rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                padding: 0.35em 0.75em;
                border-radius: 2px;
            }
            .artist-card .country {
                font-family: 'Roboto Slab', serif;
                color: #6c757d;
                font-size: 0.85rem;
                margin-top: 0.5rem;
            }
            .artist-card .card-actions {
                padding: 0.8rem 1.5rem 1.2rem;
                display: flex;
                gap: 0.5rem;
                border-top: 1px solid #f0f0f0;
            }
            .btn-action {
                font-family: 'Montserrat', sans-serif;
                font-size: 0.75rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                padding: 0.4rem 0.9rem;
                border-radius: 2px;
                text-decoration: none;
                border: none;
                cursor: pointer;
                transition: opacity 0.2s;
            }
            .btn-action:hover { opacity: 0.85; }
            .btn-view { background: #212529; color: #fff; }
            .btn-edit { background: #fec810; color: #212529; }
            .btn-delete { background: transparent; color: #dc3545; border: 1px solid #dc3545; }
            .btn-delete:hover { background: #dc3545; color: #fff; opacity: 1; }

            .page-header-section {
                background: linear-gradient(to bottom, #212529 0%, #3d4149 100%);
                padding: 6rem 0 3rem;
                margin-top: 72px;
            }
            .page-header-section h2 {
                font-family: 'Montserrat', sans-serif;
                font-weight: 700;
                text-transform: uppercase;
                color: #fff;
                font-size: 2.5rem;
                margin-bottom: 0.5rem;
            }
            .page-header-section p {
                font-family: 'Roboto Slab', serif;
                color: #adb5bd;
                font-size: 1rem;
            }
            .empty-state {
                text-align: center;
                padding: 4rem 0;
                color: #adb5bd;
                font-family: 'Roboto Slab', serif;
            }
            .empty-state i { font-size: 3rem; margin-bottom: 1rem; color: #dee2e6; }
        </style>
    </head>
    <body id="page-top">

        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
            <div class="container">
                <a class="navbar-brand" href="#page-top">
                    <i class="fas fa-music me-2"></i>ArtistDB
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive">
                    Menu <i class="fas fa-bars ms-1"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0">
                        <li class="nav-item"><a class="nav-link" href="/index.html">Artistes</a></li>
                        <li class="nav-item"><a class="nav-link btn btn-primary btn-sm text-white ms-3 px-3" href="/create.html">+ Ajouter</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Page Header -->
        <div class="page-header-section">
            <div class="container">
                <h2>Liste des artistes</h2>
                <p>Gérez vos artistes — ajoutez, modifiez ou supprimez.</p>
            </div>
        </div>

        <!-- Artists Section -->
        <section class="page-section bg-light">
            <div class="container">

                <!-- Notification -->
                <div id="notification" class="mb-4" style="display:none;"></div>

                <!-- Header row -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <p class="text-muted mb-0" id="artistCount" style="font-family:'Roboto Slab',serif; font-size:0.9rem;"></p>
                    <a href="/create.html" class="btn btn-primary text-uppercase" style="font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.8rem; letter-spacing:0.05em;">
                        <i class="fas fa-plus me-2"></i>Nouvel artiste
                    </a>
                </div>

                <!-- Cards Grid -->
                <div class="row g-4" id="artistsList">
                    <!-- Chargement -->
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3 text-muted" style="font-family:'Roboto Slab',serif;">Chargement des artistes...</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer py-4">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-4 text-lg-start" style="font-family:'Roboto Slab',serif;">Copyright &copy; ArtistDB 2026</div>
                    <div class="col-lg-4 my-3 my-lg-0 text-center">
                        <i class="fas fa-music text-primary"></i>
                    </div>
                    <div class="col-lg-4 text-lg-end">
                        <a class="link-dark text-decoration-none me-3" href="#">Politique de confidentialité</a>
                    </div>
                </div>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/scripts.js"></script>
        <script>
            fetch('/api/artists')
                .then(res => res.json())
                .then(artists => {
                    const container = document.getElementById('artistsList');
                    const countEl = document.getElementById('artistCount');

                    countEl.textContent = `${artists.length} artiste${artists.length > 1 ? 's' : ''} trouvé${artists.length > 1 ? 's' : ''}`;

                    if (artists.length === 0) {
                        container.innerHTML = `
                            <div class="col-12 empty-state">
                                <i class="fas fa-music"></i>
                                <p>Aucun artiste pour le moment.</p>
                                <a href="/create.html" class="btn btn-primary text-uppercase" style="font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.8rem;">Ajouter le premier</a>
                            </div>`;
                        return;
                    }

                    container.innerHTML = artists.map(artist => `
                        <div class="col-lg-4 col-md-6">
                            <div class="artist-card">
                                <div class="card-header">
                                    <h5>${artist.name}</h5>
                                </div>
                                <div class="card-body">
                                    <span class="badge-genre">${artist.genre || 'Genre inconnu'}</span>
                                    <p class="country mt-2 mb-0">
                                        <i class="fas fa-map-marker-alt me-1"></i>${artist.country || 'Pays inconnu'}
                                    </p>
                                    ${artist.description ? `<p class="text-muted mt-2 mb-0" style="font-size:0.85rem; font-family:'Roboto Slab',serif;">${artist.description.substring(0, 80)}${artist.description.length > 80 ? '...' : ''}</p>` : ''}
                                </div>
                                <div class="card-actions">
                                    <a href="/view.html?id=${artist.id}" class="btn-action btn-view">
                                        <i class="fas fa-eye me-1"></i>Voir
                                    </a>
                                    <a href="/edit.html?id=${artist.id}" class="btn-action btn-edit">
                                        <i class="fas fa-pen me-1"></i>Modifier
                                    </a>
                                    <button onclick="deleteArtist(${artist.id}, '${artist.name}')" class="btn-action btn-delete ms-auto">
                                        <i class="fas fa-trash me-1"></i>Supprimer
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                })
                .catch(() => {
                    document.getElementById('artistsList').innerHTML = `
                        <div class="col-12 empty-state">
                            <i class="fas fa-exclamation-triangle text-danger"></i>
                            <p>Impossible de charger les artistes.</p>
                        </div>`;
                });

            function deleteArtist(id, name) {
                if (confirm(`Supprimer l'artiste "${name}" ?`)) {
                    fetch(`/api/artists/${id}`, { method: 'DELETE' })
                        .then(() => location.reload());
                }
            }
        </script>
    </body>
</html>
