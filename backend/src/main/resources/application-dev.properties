# ---- Base de données (locale XAMPP) ----
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/pid_reservations_group?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Hikari ----
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# ---- JPA / Hibernate (dev = verbose) ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ---- Initialisation SQL ----
spring.sql.init.mode=always

# ---- Logs (dev = détaillé) ----
logging.level.root=INFO
logging.level.be.icc.pid=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ---- Serveur ----
server.port=8080
