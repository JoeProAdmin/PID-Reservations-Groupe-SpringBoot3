# ---- Base de données (via Docker) ----
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/pid_reservations_group?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:pid_user}
spring.datasource.password=${DB_PASSWORD:pid_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Hikari (pool optimisé prod) ----
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3

# ---- JPA / Hibernate (prod) ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true

# ---- Initialisation SQL ----
spring.sql.init.mode=always

# ---- Logs (prod = moins verbeux) ----
logging.level.root=WARN
logging.level.be.icc.pid=INFO
logging.level.org.hibernate.SQL=WARN

# ---- Sécurité ----
server.port=8080
