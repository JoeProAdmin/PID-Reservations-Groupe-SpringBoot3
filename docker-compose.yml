# ============================================
# Docker Compose - PID Reservations Groupe
# Orchestration : Backend + Frontend + MySQL
# ICC 2025-2026
# Auteur : Abdulrahman SABBAGH (Production)
# ============================================
#
# Usage :
#   docker-compose up -d          -> Lancer tous les services
#   docker-compose down           -> Arreter tous les services
#   docker-compose logs -f        -> Voir les logs en temps reel
#   docker-compose build --no-cache -> Rebuild sans cache
#

services:

  # ==========================================
  # Base de donnees MySQL
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: pid-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pid_reservations_group}
      MYSQL_USER: ${MYSQL_USER:-pid_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pid_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - pid-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==========================================
  # Backend - Spring Boot 3
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pid-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Base de donnees
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-pid_reservations_group}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-pid_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-pid_password}
      # Profil Spring
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # JWT (a deployer securise en prod via .env)
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - pid-network

  # ==========================================
  # Frontend - React (Nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://backend:8080}
    container_name: pid-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - pid-network

# ==========================================
# Volumes persistants
# ==========================================
volumes:
  mysql_data:
    driver: local

# ==========================================
# Reseau interne Docker
# ==========================================
networks:
  pid-network:
    driver: bridge
    name: pid-reservations-network
